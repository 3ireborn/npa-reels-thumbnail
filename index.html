<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reels Thumbnail Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact:wght@400;700&family=Arial:wght@700&display=swap');
        
        .thumbnail {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        
        .overlay-text {
            position: absolute;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9),
                        -3px -3px 6px rgba(0,0,0,0.9),
                        3px -3px 6px rgba(0,0,0,0.9),
                        -3px 3px 6px rgba(0,0,0,0.9);
            font-family: 'Impact', sans-serif;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 1.1;
        }
        
        .hook { color: #fff; font-size: 1.8rem; }
        .problem { color: #facc15; font-size: 2.2rem; }
        .solution { color: #22c55e; font-size: 1.6rem; }
        .cta { color: #ef4444; font-size: 1.4rem; }
        
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Isi kode lengkap seperti yang saya buat di atas -->
</body>
</html>
