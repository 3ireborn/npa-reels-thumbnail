<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPA SMART SYSTEM VVIP 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact:wght@700&family=Poppins:wght@400;500;600&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .overlay-text { font-family: 'Impact', sans-serif; text-shadow: 3px 3px 8px rgba(0,0,0,0.9); }
    </style>
</head>
<body class="bg-[#2D2D2D] text-white min-h-screen">

<div class="max-w-4xl mx-auto p-6">
    <h1 class="text-center text-3xl font-bold mb-2">NPA SMART SYSTEM</h1>
    <p class="text-center text-[#F4B400] mb-10">AI Content Creator Suite</p>

    <!-- Upload -->
    <div id="upload-area" class="bg-white rounded-3xl p-10 text-center cursor-pointer mb-8">
        <i class="fas fa-cloud-upload-alt text-6xl text-red-600 mb-4"></i>
        <h3 class="text-2xl font-semibold text-black">Upload Foto Referensi</h3>
        <input type="file" id="file-input" class="hidden" accept="image/*">
    </div>

    <div id="preview-area" class="hidden mb-8">
        <div class="relative mx-auto max-w-sm" id="thumbnail-container">
            <img id="preview-img" class="w-full rounded-3xl">
            <!-- Text Overlay Preview -->
            <div id="text-overlay" class="absolute inset-0 flex flex-col justify-between p-6 text-center"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Persona -->
        <div>
            <label class="block text-[#F4B400] mb-3 font-medium">Objek / Persona</label>
            <select id="persona" class="w-full bg-[#1F1F1F] rounded-2xl px-6 py-5">
                <option value="Emak">Emak</option>
                <option value="Karyawan">Karyawan</option>
                <option value="PNS">PNS</option>
                <option value="Pedagang">Pedagang</option>
                <option value="Pengusaha">Pengusaha</option>
                <option value="Mahasiswa">Mahasiswa</option>
                <option value="TKW">TKW</option>
            </select>
        </div>

        <!-- Style -->
        <div>
            <label class="block text-[#F4B400] mb-3 font-medium">Style / Gaya</label>
            <select id="style" class="w-full bg-[#1F1F1F] rounded-2xl px-6 py-5">
                <option value="FOMO">FOMO</option>
                <option value="SHOCK">SHOCK</option>
                <option value="SEMANGAT">SEMANGAT</option>
                <option value="CURIOSITY">CURIOSITY</option>
            </select>
        </div>
    </div>

    <button onclick="generateAll()" 
            class="mt-12 w-full py-8 bg-gradient-to-r from-yellow-400 to-red-600 rounded-3xl text-black font-bold text-2xl flex items-center justify-center gap-3">
        ✨ GENERATE SEMUA
    </button>
</div>

<script>
    let uploadedImage = null;

    document.getElementById('upload-area').addEventListener('click', () => {
        document.getElementById('file-input').click();
    });

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                uploadedImage = ev.target.result;
                document.getElementById('preview-img').src = uploadedImage;
                document.getElementById('preview-area').classList.remove('hidden');
                document.getElementById('upload-area').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }
    });

    function generateAll() {
        if (!uploadedImage) {
            alert("Upload foto dulu ya beb!");
            return;
        }

        const persona = document.getElementById('persona').value;
        const style = document.getElementById('style').value;

        // Mock Overlay Text
        const overlayHTML = `
            <div class="overlay-text text-yellow-400 text-4xl font-black">FOMO BANGET!</div>
            <div class="overlay-text text-white text-5xl font-black mt-8">GAJI NAIK TAPI</div>
            <div class="overlay-text text-red-400 text-4xl font-black">TABUNGAN TIPIS?</div>
            <div class="overlay-text text-white text-3xl mt-auto">SOLUSI ADA DI SINI</div>
        `;

        document.getElementById('text-overlay').innerHTML = overlayHTML;

        alert(`✅ Berhasil Generate untuk ${persona} dengan style ${style}!\n\n• Hook + Thumbnail sudah dibuat\n• Prompt gambar siap pakai\n• Caption & Video Prompt disesuaikan`);
    }
</script>
</body>
</html>
