<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reels Thumbnail Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact:wght@400;700&family=Arial:wght@700&display=swap');
        
        .thumbnail {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        
        .overlay-text {
            position: absolute;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9),
                        -3px -3px 6px rgba(0,0,0,0.9),
                        3px -3px 6px rgba(0,0,0,0.9),
                        -3px 3px 6px rgba(0,0,0,0.9);
            font-family: 'Impact', sans-serif;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 1.1;
        }
        
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8 border-b border-gray-700 pb-6">
            <div>
                <h1 class="text-4xl font-bold flex items-center gap-3">
                    <span class="text-yellow-400">🎥</span> AI REELS GENERATOR
                </h1>
                <p class="text-gray-400">Buat thumbnail Reels viral seperti Nur Muthmainnah</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-8">
                <!-- Upload Section -->
                <div class="bg-gray-800 rounded-2xl p-6">
                    <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-image"></i> Upload Foto / Produk
                    </h3>
                    <div id="upload-area" class="border-2 border-dashed border-gray-600 rounded-xl h-64 flex flex-col items-center justify-center cursor-pointer hover:border-yellow-400 transition-colors">
                        <i class="fas fa-cloud-upload-alt text-5xl text-gray-500 mb-4"></i>
                        <p class="text-gray-400">Klik atau tarik gambar ke sini</p>
                        <input type="file" id="image-upload" class="hidden" accept="image/*">
                    </div>
                    <div id="preview-upload" class="hidden mt-4">
                        <img id="uploaded-img" class="w-full rounded-xl max-h-64 object-cover">
                    </div>
                </div>

                <!-- Tema, Emosi, Teks, Ratio, Button -->
                <!-- (kode lengkap sama seperti sebelumnya - silakan pakai versi lama untuk bagian ini) -->

                <button onclick="generateThumbnails()" class="w-full bg-gradient-to-r from-yellow-400 to-amber-500 text-black font-bold text-xl py-6 rounded-3xl flex items-center justify-center gap-3">
                    <i class="fas fa-magic"></i> GENERATE THUMBNAILS
                </button>
            </div>

            <div class="lg:col-span-8">
                <div id="results" class="preview-grid"></div>
            </div>
        </div>
    </div>

    <script>
        // Script lengkap (dari versi sebelumnya)
        // ... (saya sarankan copy seluruh script dari respons sebelumnya)
    </script>
</body>
</html>
